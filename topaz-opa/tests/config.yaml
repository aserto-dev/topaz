services:
  ghcr-registry:
    url: https://ghcr.io
    type: oci
    credentials:
      bearer:
        scheme: "Bearer"
        token: "${GIT_TOKEN}"

bundles:
  authz:
    service: ghcr-registry
    resource: ghcr.io/aserto-policies/policy-rebac:2.5.1
    persist: false
    polling:
      min_delay_seconds: 30
      max_delay_seconds: 120

plugins:
    topaz:
      enabled: false
      connection:
        address: localhost:9292
        token: ""
        api_key: ""
        client_cert_path: ""
        client_key_path: ""
        ca_cert_path: ""
        insecure: true
        no_tls: false
        no_proxy: false
        headers:
          # "header": "value"
      request_timeout: 5s

    authzen:
      enabled: false
