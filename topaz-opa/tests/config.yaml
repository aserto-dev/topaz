services:
  ghcr-registry:
    url: https://ghcr.io
    type: oci
    credentials:
      bearer:
        scheme: "Bearer"
        token: "${GIT_TOKEN}"

bundles:
  authz:
    service: ghcr-registry
    resource: ghcr.io/aserto-policies/policy-rebac:2.5.1
    persist: false
    polling:
      min_delay_seconds: 30
      max_delay_seconds: 120

plugins:
    topaz:
      enabled: true
      connection:
        address: :9292
        token: ""
        api_key: ""
        client_cert_path: ""
        client_key_path: ""
        ca_cert_path: ""
        insecure: true
        no_tls: false
        no_proxy: false
        headers:
          # "header": "value"
      request_timeout: 5s

    authzen_service:
      enabled: true
      service:
        grpc:
          listen_address: ":8282"
          fqdn: ""
          certs:
            tls_key_path: '${TOPAZ_CERTS_DIR}/grpc.key'
            tls_cert_path: '${TOPAZ_CERTS_DIR}/grpc.crt'
            tls_ca_cert_path: '${TOPAZ_CERTS_DIR}/grpc-ca.crt'
          connection_timeout: 5s
          reflection: true
        gateway:
          enabled: false
          listen_address: ":8383"
          fqdn: ""
          http: false
          certs:
            tls_key_path: '${TOPAZ_CERTS_DIR}/gateway.key'
            tls_cert_path: '${TOPAZ_CERTS_DIR}/gateway.crt'
            tls_ca_cert_path: '${TOPAZ_CERTS_DIR}/gateway-ca.crt'
          timeouts:
            read_timeout: 2s
            read_header_timeout: 2s
            write_timeout: 2s
            idle_timeout: 30s
          cqrs:
            allowed_origins:
            - https://localhost
            - https://localhost:*
            - https://0.0.0.0:*
            allowed_headers:
            - "Authorization"
            - "Content-Type"
            - "If-Match"
            - "If-None-Match"
            - "Depth"
            allowed_methods:
            - "GET"
            - "POST"
            - "HEAD"
            - "DELETE"
            - "PUT"
            - "PATCH"
            - "PROFIND"
            - "MKCOL"
            - "COPY"
            - "MOVE"

    authzen_logger:
      enabled: true
      logger:
        filename: ""
        max_size: 100 # Megabytes before splitting file
        max_backups: 5 # Retain up to 5 historical log files
        max_age: 14 # Retain historical log files for 14 days
        local_time: false # Use UTC timestamps
        compress: true # Compress rolled files using gzip

decision_logs:
  plugin: authzen_logger
