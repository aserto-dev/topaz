services:
  ghcr-registry:
    url: https://ghcr.io
    type: oci
    credentials:
      bearer:
        scheme: "Bearer"
        token: "${GIT_TOKEN}"

bundles:
  authz:
    service: ghcr-registry
    resource: ghcr.io/aserto-policies/policy-rebac:2.5.1
    persist: false
    polling:
      min_delay_seconds: 30
      max_delay_seconds: 120