syntax = "proto3";

package directory.v4.writer;

import "directory/v4/manifest.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/aserto-dev/topaz/api/directory/v4/writer;writer";

message SetManifestRequest {
  directory.v4.Manifest manifest = 1;
}

message SetManifestResponse {
  directory.v4.Manifest manifest = 1;
}

message DeleteManifestRequest {
  string id = 1;
}

message DeleteManifestResponse {
  // empty result
  google.protobuf.Empty result = 1;
}
