---
name: ci

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  push:
    # Publish `main` as Docker `latest` image.
    branches:
      - main
    # Publish `v1.2.3` tags as releases.
    tags:
      - v*
  # Run tests for all PRs
  pull_request:

permissions:
  actions: write
  attestations: write
  contents: write
  deployments: write
  packages: write

env:
  PRE_RELEASE: ${{ github.ref == 'refs/heads/main' && 'main' || '' }}
  GO_RELEASER_VER: "v2.14.1"
  GO_LANGCI_LINT_VER: "v2.11.4"
  GO_TESTSUM_VER: "1.13.0"
  SYFT_VER: "v1.13.0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      -
        uses: actions/checkout@v6
      -
        name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      -
        name: Test Setup
        uses: gertd/action-gotestsum@v3.0.0
        with:
          gotestsum_version: ${{ env.GO_TESTSUM_VER }}
      -
        name: Setup QEMU
        uses: docker/setup-qemu-action@v4
      - 
        name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to GitHub Packages Docker Registry
        uses: docker/login-action@v4
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Build
        uses: goreleaser/goreleaser-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_CLI_EXPERIMENTAL: "enabled"
        with:
          distribution: goreleaser
          version: ${{ env.GO_RELEASER_VER }}
          args: build --clean --snapshot --single-target
      -
        name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GO_LANGCI_LINT_VER }}
          args: --timeout=30m
      -
        name: Test Snapshot
        uses: goreleaser/goreleaser-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_CLI_EXPERIMENTAL: "enabled"
        with:
          distribution: goreleaser
          version: ${{ env.GO_RELEASER_VER }}
          args: release --config .goreleaser-test.yml --clean --snapshot --skip archive,homebrew,sbom
      -
        name: Unit Tests
        run: |
          gotestsum --format short-verbose -- $(go list ./... | grep -v topazd/tests) \
            -count=1 -timeout 120s -parallel=1 -v -coverprofile=cover.out -coverpkg=./...
      -
        name: Tests topazd
        run: |
          gotestsum --format short-verbose -- $(go list ./topazd/tests/... | grep -v tests/template) \
            -count=1 -timeout 120s -parallel=1 -v -coverprofile=cover.out -coverpkg=./...
      -
        name: Templates Test (no-tls)
        run: |
          gotestsum --format short-verbose -- github.com/aserto-dev/topaz/topazd/tests/template-no-tls/... \
            -count=1 -timeout 240s -parallel=1 -v -coverprofile=cover.out -coverpkg=./...
      -
        name: Templates Test (with-tls)
        run: |
          gotestsum --format short-verbose -- github.com/aserto-dev/topaz/topazd/tests/template-with-tls/... \
            -count=1 -timeout 120s -parallel=1 -v -coverprofile=cover.out -coverpkg=./...
      -
        name: Upload code coverage
        uses: shogo82148/actions-goveralls@v1
        continue-on-error: true
        with:
          path-to-profile: cover.out

  push:
    needs: [test]
    runs-on: ubuntu-latest
    # when on a branch only push if the branch is main
    # always push when ref is a tag
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      -
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      -
        name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      -
        name: Setup QEMU
        uses: docker/setup-qemu-action@v4
      - 
        name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to GitHub Packages Docker Registry
        uses: docker/login-action@v4
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Setup syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: ${{ env.SYFT_VER }}
      -
        name: Push image to GitHub Container Registry
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: ${{ env.GO_RELEASER_VER }}
          args: release --clean --snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_CLI_EXPERIMENTAL: "enabled"

  release:
    needs: [test, push]
    runs-on: ubuntu-latest
    env:
      ASERTO_TAP: "{{ secret.ASERTO_TAP }}"
    # Only release when ref is a tag
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      -
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      -
        name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      -
        name: Setup QEMU
        uses: docker/setup-qemu-action@v4
      - 
        name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to GitHub Packages Docker Registry
        uses: docker/login-action@v4
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Setup syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: ${{ env.SYFT_VER }}
      -
        name: Release
        uses: goreleaser/goreleaser-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP: ${{ secrets.RELEASE_TOKEN }}
          DOCKER_CLI_EXPERIMENTAL: "enabled"
        with:
          distribution: goreleaser
          version: ${{ env.GO_RELEASER_VER }}
          args: release --clean
      - 
        name: Archive deployment examples
        run: |
          cd docs/deployments/sidecar-deployment && zip topaz_deployment_examples.zip *.yaml
      - 
        name: Upload deployment examples
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: docs/deployments/sidecar-deployment
          asset_name: topaz_deployment_examples.zip
          tag: ${{ github.ref }}
          overwrite: false

  msi:
    needs: release
    runs-on: windows-latest
    steps:
      - 
        name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - 
        name: Download exe
        id: download_exe
        shell: bash
        run: |
          gh release download "${GITHUB_REF#refs/tags/}" -p "topaz_windows_amd64.zip"
          printf "zip=%s\n" *.zip >> $GITHUB_OUTPUT
          unzip -o *.zip && rm -v *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - 
        name: Install go-msi
        run: choco install -y "go-msi"
      - 
        name: Prepare PATH
        shell: bash
        run: |
          echo "$WIX\\bin" >> $GITHUB_PATH
          echo "C:\\Program Files\\go-msi" >> $GITHUB_PATH
      - 
        name: Build MSI
        id: buildmsi
        shell: bash
        env:
          ZIP_FILE: ${{ steps.download_exe.outputs.zip }}
        run: |
          mkdir -p build
          msi="$(basename "$ZIP_FILE" ".zip").msi"
          printf "msi=${msi}" >> $GITHUB_OUTPUT
          go-msi make --arch amd64 --msi "$PWD/$msi" --out "$PWD/build" --version "${GITHUB_REF#refs/tags/}"
      - 
        name: Upload MSI
        shell: bash
        run: |
          tag_name="${GITHUB_REF#refs/tags/}"
          gh release upload "$tag_name" "$MSI_FILE" --repo aserto-dev/topaz --clobber
        env:
          MSI_FILE: ${{ steps.buildmsi.outputs.msi }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
